site_name: mviewer
site_description: Documentation de la plateforme mviewer
site_author: Communauté mviewer
docs_dir: docs

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
    - scheme: slate
      primary: teal
      accent: deep orange
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details

nav:
  - Accueil: index.md
  - Documentation utilisateur:
      - Interface utilisateur: doc_user/interface.md
      - Gestionnaire: doc_user/manager.md
      - Gestion de l'affichage: doc_user/display.md
      - Navigation: doc_user/navigation.md
      - Outils additionnels: doc_user/other_tools.md
      - Barre de recherche: doc_user/search.md
      - Documentation intégrée: doc_user/documentation.md
      - Fonds de carte: doc_user/maps.md
      - Crédits: doc_user/credits.md
      - Cookies et trackers: doc_user/cookies.md
  - Documentation technique:
      - Installer MVIEWER: doc_tech/deploy.md
      - Principe de configuration: doc_tech/config_intro.md
      - Bien commencer avec mviewer: doc_tech/config_practices.md
      - Configurer l'application: doc_tech/config_app.md
      - Configurer la carte: doc_tech/config_map.md
      - Configurer les fonds de carte: doc_tech/config_baselayers.md
      - Configurer les thématiques: doc_tech/config_topics.md
      - Configurer les couches: doc_tech/config_layers.md
      - Configurer la recherche: doc_tech/config_search.md
      - Configurer Elasticsearch: doc_tech/config_els.md
      - Configurer Fuse: doc_tech/config_fuse.md
      - Configurer le proxy: doc_tech/config_proxy.md
      - Configurer les extensions: doc_tech/config_extensions.md
      - Configurer l'apparence: doc_tech/config_css.md
      - Configurer les templates: doc_tech/config_tpl.md
      - Déboguer les erreurs courantes: doc_tech/config_debug.md
      - Traduction: doc_tech/config_translate.md
      - Custom layer: doc_tech/config_customlayer.md
      - Custom control: doc_tech/config_customcontrol.md
      - Custom component: doc_tech/config_customcomponent.md
      - Styles: doc_tech/config_styles.md
      - Outils: doc_tech/config_tools.md
      - Variables d'environnement: doc_tech/config_environmentvar.md
      - Paramètres d'URL: doc_tech/config_urlparams.md
  - Documentation développeur:
      - Développer avec mviewer: doc_dev/dev_intro.md
      - Développer ses propres composants: doc_dev/custom.md
      - Custom layer: doc_dev/customlayer.md
      - Custom control: doc_dev/customcontrol.md
      - Custom component: doc_dev/customcomponent.md
      - Fonctions publiques: doc_dev/public_fonctions.md
      - Approfondir custom layer: doc_dev/customlayer_dev.md
      - Approfondir custom control: doc_dev/customcontrol_dev.md
      - Template custom layer: doc_dev/customlayer_template.md
  - Documentation contributeur:
      - Contribuer: doc_contrib/contrib.md
      - Contribuer à la documentation: doc_contrib/doc.md
      - Créer une issue: doc_contrib/issue.md
      - Travailler avec Git et GitHub: doc_contrib/git.md
      - Faire une release: doc_contrib/release.md
